<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Chatbot - Login 🍜</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .auth-container {
            width: 420px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .auth-header {
            background-color: #ff6b6b;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .auth-header h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .auth-header p { font-size: 0.85rem; opacity: 0.9; }

        .tabs {
            display: flex;
            background-color: #f8f8f8;
            border-bottom: 1px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab.active {
            color: #ff6b6b;
            border-bottom-color: #ff6b6b;
            background-color: #fff;
        }
        .tab:hover { color: #ff6b6b; }

        .form-container { padding: 30px; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
        }
        .form-group input:focus {
            border-color: #ff6b6b;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .submit-btn:hover { background-color: #ff5252; }
        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .message {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }
        .message.error {
            background-color: #ffe0e0;
            color: #d32f2f;
            border: 1px solid #ffcdd2;
            display: block;
        }
        .message.success {
            background-color: #e0f5e0;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
            display: block;
        }

        .guest-link {
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
            color: #999;
            border-top: 1px solid #eee;
        }
        .guest-link a {
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 600;
        }
        .guest-link a:hover { text-decoration: underline; }

        .features {
            padding: 0 30px 20px;
            font-size: 0.85rem;
            color: #777;
        }
        .features h3 {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 8px;
        }
        .features ul {
            list-style: none;
            padding: 0;
        }
        .features ul li {
            padding: 4px 0;
        }
        .features ul li::before {
            content: "✅ ";
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h1>🍜 Food Chatbot</h1>
        <p>Your personal Singapore food guide</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Login</div>
        <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <div class="form-container">
        <!-- LOGIN FORM -->
        <div class="form-panel active" id="login-panel">
            <div class="message" id="login-msg"></div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button type="submit" class="submit-btn" id="login-btn">Login</button>
            </form>
        </div>

        <!-- REGISTER FORM -->
        <div class="form-panel" id="register-panel">
            <div class="message" id="register-msg"></div>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" required placeholder="Choose a username" minlength="3" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required placeholder="Min. 6 characters" minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" required placeholder="Re-enter password" minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="submit-btn" id="reg-btn">Create Account</button>
            </form>

            <div class="features" style="margin-top: 15px;">
                <h3>Why create an account?</h3>
                <ul>
                    <li>Save your food preferences</li>
                    <li>Chat history across sessions</li>
                    <li>Personalised recommendations</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="guest-link">
        Or <a href="/chat/guest">continue as guest</a> (no history saved)
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));

        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('login-panel').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('register-panel').classList.add('active');
        }
        // Clear messages
        document.getElementById('login-msg').className = 'message';
        document.getElementById('register-msg').className = 'message';
    }

    function showMessage(elementId, text, type) {
        const el = document.getElementById(elementId);
        el.textContent = text;
        el.className = `message ${type}`;
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                showMessage('login-msg', 'Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/', 800);
            } else {
                showMessage('login-msg', data.error || 'Login failed', 'error');
            }
        } catch (err) {
            showMessage('login-msg', 'Could not connect to server', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Login';
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('reg-btn');

        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;

        if (password !== confirm) {
            showMessage('register-msg', 'Passwords do not match', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();

            if (data.success) {
                showMessage('register-msg', 'Account created! Setting up your preferences...', 'success');
                setTimeout(() => window.location.href = '/settings?onboarding=1', 800);
            } else {
                showMessage('register-msg', data.error || 'Registration failed', 'error');
            }
        } catch (err) {
            showMessage('register-msg', 'Could not connect to server', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }
</script>
</body>
</html>
