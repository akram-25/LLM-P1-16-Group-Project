<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Chatbot - Login 🍜</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-hover: #ff5252;
            --focus-glow: rgba(78, 205, 196, 0.15);
            --focus-border: #4ecdc4;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --input-bg: #f4f6f8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .auth-header {
            padding: 40px 30px 20px;
            text-align: center;
        }
        
        .auth-header h1 { 
            font-size: 1.75rem; 
            font-weight: 700;
            margin-bottom: 8px; 
            color: var(--text-dark);
        }
        
        .auth-header p { 
            font-size: 0.95rem; 
            color: var(--text-light);
        }

        .tabs-container {
            padding: 0 30px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            background-color: var(--input-bg);
            border-radius: 16px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-light);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: var(--text-dark);
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .form-container { 
            padding: 0 30px 30px; 
        }
        
        .form-panel { 
            display: none; 
            animation: fadeIn 0.4s ease;
        }
        
        .form-panel.active { 
            display: block; 
        }

        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.85rem;
            padding-left: 4px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 16px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            background-color: #ffffff;
            border-color: var(--focus-border);
            box-shadow: 0 0 0 4px var(--focus-glow);
        }

        .form-group input::placeholder {
            color: #a0aab5;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.25);
        }
        
        .submit-btn:hover { 
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 107, 0.35);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            background-color: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .message.error {
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fee2e2;
            display: block;
        }
        .message.success {
            background-color: #f0fdf4;
            color: #22c55e;
            border: 1px solid #dcfce7;
            display: block;
        }

        .form-group input.invalid {
            border-color: #ef4444;
            background-color: #fff8f8;
        }
        .form-group input.valid {
            border-color: #22c55e;
        }
        .field-error {
            font-size: 0.78rem;
            color: #ef4444;
            margin-top: 5px;
            padding-left: 4px;
            display: none;
        }
        .field-error.visible {
            display: block;
        }

        .features {
            margin-top: 25px;
            padding: 20px;
            background-color: #f8fafc;
            border-radius: 16px;
            font-size: 0.85rem;
            color: var(--text-light);
            border: 1px solid #f1f5f9;
        }
        .features h3 {
            font-size: 0.85rem;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-weight: 600;
        }
        .features ul {
            list-style: none;
        }
        .features ul li {
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .features ul li::before {
            content: "✨";
            font-size: 0.9rem;
        }

        .guest-link {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
            border-top: 1px solid #f1f5f9;
            background-color: #fafbfc;
        }
        .guest-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .guest-link a:hover { 
            color: var(--primary-hover);
            text-decoration: underline; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h1><span>🍜</span>Food Chatbot</h1>
        <p>Your personal Singapore food guide</p>
    </div>

    <div class="tabs-container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>
    </div>

    <div class="form-container">
        <div class="form-panel active" id="login-panel">
            <div class="message" id="login-msg"></div>
            <form onsubmit="handleLogin(event)" novalidate>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username">
                    <span class="field-error" id="login-username-err"></span>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
                    <span class="field-error" id="login-password-err"></span>
                </div>
                <button type="submit" class="submit-btn" id="login-btn">Login</button>
            </form>
        </div>

        <div class="form-panel" id="register-panel">
            <div class="message" id="register-msg"></div>
            <form onsubmit="handleRegister(event)" novalidate>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="3–20 chars, letters/numbers/underscores" autocomplete="username">
                    <span class="field-error" id="reg-username-err"></span>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
                    <span class="field-error" id="reg-email-err"></span>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Min. 6 characters" autocomplete="new-password">
                    <span class="field-error" id="reg-password-err"></span>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" placeholder="Re-enter password" autocomplete="new-password">
                    <span class="field-error" id="reg-confirm-err"></span>
                </div>
                <button type="submit" class="submit-btn" id="reg-btn">Create Account</button>
            </form>

            <div class="features">
                <h3>Why create an account?</h3>
                <ul>
                    <li>Save your food preferences</li>
                    <li>Keep chat history across sessions</li>
                    <li>Get personalised recommendations</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="guest-link">
        Or <a href="/chat/guest">continue as guest</a>
    </div>
</div>

<script>
    // ── Validation rules ──────────────────────────────────────────────────────
    const RULES = {
        username: {
            test: v => /^[a-zA-Z0-9_]{3,20}$/.test(v),
            message: 'Username must be 3–20 characters (letters, numbers, underscores only)'
        },
        email: {
            test: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),
            message: 'Please enter a valid email address'
        },
        password: {
            test: v => v.length >= 6 && v.length <= 128,
            message: 'Password must be 6–128 characters'
        }
    };

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setFieldState(inputId, errId, errorMsg) {
        const input = document.getElementById(inputId);
        const err   = document.getElementById(errId);
        if (errorMsg) {
            input.classList.add('invalid');
            input.classList.remove('valid');
            err.textContent = errorMsg;
            err.classList.add('visible');
        } else {
            input.classList.remove('invalid');
            input.classList.add('valid');
            err.textContent = '';
            err.classList.remove('visible');
        }
        return !errorMsg;
    }

    function clearFieldState(inputId, errId) {
        const input = document.getElementById(inputId);
        const err   = document.getElementById(errId);
        input.classList.remove('invalid', 'valid');
        err.textContent = '';
        err.classList.remove('visible');
    }

    function showMessage(elementId, text, type) {
        const el = document.getElementById(elementId);
        el.textContent = text;
        el.className = `message ${type}`;
    }

    // ── Real-time validation listeners ────────────────────────────────────────
    document.getElementById('reg-username').addEventListener('input', function () {
        if (!this.value) { clearFieldState('reg-username', 'reg-username-err'); return; }
        setFieldState('reg-username', 'reg-username-err',
            RULES.username.test(this.value.trim()) ? null : RULES.username.message);
    });

    document.getElementById('reg-email').addEventListener('input', function () {
        if (!this.value) { clearFieldState('reg-email', 'reg-email-err'); return; }
        setFieldState('reg-email', 'reg-email-err',
            RULES.email.test(this.value.trim()) ? null : RULES.email.message);
    });

    document.getElementById('reg-password').addEventListener('input', function () {
        if (!this.value) { clearFieldState('reg-password', 'reg-password-err'); return; }
        setFieldState('reg-password', 'reg-password-err',
            RULES.password.test(this.value) ? null : RULES.password.message);
        // Re-check confirm if already touched
        const confirm = document.getElementById('reg-confirm');
        if (confirm.value) {
            setFieldState('reg-confirm', 'reg-confirm-err',
                this.value === confirm.value ? null : 'Passwords do not match');
        }
    });

    document.getElementById('reg-confirm').addEventListener('input', function () {
        if (!this.value) { clearFieldState('reg-confirm', 'reg-confirm-err'); return; }
        const password = document.getElementById('reg-password').value;
        setFieldState('reg-confirm', 'reg-confirm-err',
            this.value === password ? null : 'Passwords do not match');
    });

    // ── Tab switcher ──────────────────────────────────────────────────────────
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));

        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('login-panel').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('register-panel').classList.add('active');
        }
        document.getElementById('login-msg').className = 'message';
        document.getElementById('register-msg').className = 'message';
    }

    // ── Login submit ──────────────────────────────────────────────────────────
    async function handleLogin(e) {
        e.preventDefault();

        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        // Basic presence checks
        const uOk = setFieldState('login-username', 'login-username-err',
            username ? null : 'Username is required');
        const pOk = setFieldState('login-password', 'login-password-err',
            password ? null : 'Password is required');
        if (!uOk || !pOk) return;

        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
            const res  = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                showMessage('login-msg', 'Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/', 800);
            } else {
                showMessage('login-msg', data.error || 'Login failed', 'error');
            }
        } catch {
            showMessage('login-msg', 'Could not connect to server', 'error');
        } finally {
            if (!document.getElementById('login-msg').classList.contains('success')) {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }
    }

    // ── Register submit ───────────────────────────────────────────────────────
    async function handleRegister(e) {
        e.preventDefault();

        const username = document.getElementById('reg-username').value.trim();
        const email    = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm  = document.getElementById('reg-confirm').value;

        // Run all field validations and collect results
        const uOk = setFieldState('reg-username', 'reg-username-err',
            !username                          ? 'Username is required' :
            !RULES.username.test(username)     ? RULES.username.message : null);

        const eOk = setFieldState('reg-email', 'reg-email-err',
            !email                             ? 'Email is required' :
            !RULES.email.test(email)           ? RULES.email.message : null);

        const pOk = setFieldState('reg-password', 'reg-password-err',
            !password                          ? 'Password is required' :
            !RULES.password.test(password)     ? RULES.password.message : null);

        const cOk = setFieldState('reg-confirm', 'reg-confirm-err',
            !confirm                           ? 'Please confirm your password' :
            confirm !== password               ? 'Passwords do not match' : null);

        if (!uOk || !eOk || !pOk || !cOk) return;

        const btn = document.getElementById('reg-btn');
        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
            const res  = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();

            if (data.success) {
                showMessage('register-msg', 'Account created! Setting up your preferences...', 'success');
                setTimeout(() => window.location.href = '/settings?onboarding=1', 800);
            } else {
                showMessage('register-msg', data.error || 'Registration failed', 'error');
            }
        } catch {
            showMessage('register-msg', 'Could not connect to server', 'error');
        } finally {
            if (!document.getElementById('register-msg').classList.contains('success')) {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    }
</script>
</body>
</html>
