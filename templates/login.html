<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Chatbot - Login 🍜</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-hover: #ff5252;
            --focus-glow: rgba(78, 205, 196, 0.15);
            --focus-border: #4ecdc4;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --input-bg: #f4f6f8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .auth-header {
            padding: 40px 30px 20px;
            text-align: center;
        }
        
        .auth-header h1 { 
            font-size: 1.75rem; 
            font-weight: 700;
            margin-bottom: 8px; 
            color: var(--text-dark);
        }
        
        .auth-header p { 
            font-size: 0.95rem; 
            color: var(--text-light);
        }

        .tabs-container {
            padding: 0 30px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            background-color: var(--input-bg);
            border-radius: 16px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-light);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: var(--text-dark);
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .form-container { 
            padding: 0 30px 30px; 
        }
        
        .form-panel { 
            display: none; 
            animation: fadeIn 0.4s ease;
        }
        
        .form-panel.active { 
            display: block; 
        }

        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.85rem;
            padding-left: 4px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 16px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            background-color: #ffffff;
            border-color: var(--focus-border);
            box-shadow: 0 0 0 4px var(--focus-glow);
        }

        .form-group input::placeholder {
            color: #a0aab5;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.25);
        }
        
        .submit-btn:hover { 
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 107, 0.35);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            background-color: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .message.error {
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fee2e2;
            display: block;
        }
        .message.success {
            background-color: #f0fdf4;
            color: #22c55e;
            border: 1px solid #dcfce7;
            display: block;
        }

        .features {
            margin-top: 25px;
            padding: 20px;
            background-color: #f8fafc;
            border-radius: 16px;
            font-size: 0.85rem;
            color: var(--text-light);
            border: 1px solid #f1f5f9;
        }
        .features h3 {
            font-size: 0.85rem;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-weight: 600;
        }
        .features ul {
            list-style: none;
        }
        .features ul li {
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .features ul li::before {
            content: "✨";
            font-size: 0.9rem;
        }

        .guest-link {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
            border-top: 1px solid #f1f5f9;
            background-color: #fafbfc;
        }
        .guest-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .guest-link a:hover { 
            color: var(--primary-hover);
            text-decoration: underline; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h1><span>🍜</span>Food Chatbot</h1>
        <p>Your personal Singapore food guide</p>
    </div>

    <div class="tabs-container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>
    </div>

    <div class="form-container">
        <div class="form-panel active" id="login-panel">
            <div class="message" id="login-msg"></div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button type="submit" class="submit-btn" id="login-btn">Login</button>
            </form>
        </div>

        <div class="form-panel" id="register-panel">
            <div class="message" id="register-msg"></div>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" required placeholder="Choose a username" minlength="3" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required placeholder="Min. 6 characters" minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" required placeholder="Re-enter password" minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="submit-btn" id="reg-btn">Create Account</button>
            </form>

            <div class="features">
                <h3>Why create an account?</h3>
                <ul>
                    <li>Save your food preferences</li>
                    <li>Keep chat history across sessions</li>
                    <li>Get personalised recommendations</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="guest-link">
        Or <a href="/chat/guest">continue as guest</a>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));

        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('login-panel').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('register-panel').classList.add('active');
        }
        document.getElementById('login-msg').className = 'message';
        document.getElementById('register-msg').className = 'message';
    }

    function showMessage(elementId, text, type) {
        const el = document.getElementById(elementId);
        el.textContent = text;
        el.className = `message ${type}`;
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                showMessage('login-msg', 'Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/', 800);
            } else {
                showMessage('login-msg', data.error || 'Login failed', 'error');
            }
        } catch (err) {
            showMessage('login-msg', 'Could not connect to server', 'error');
        } finally {
            if(!document.getElementById('login-msg').classList.contains('success')) {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('reg-btn');

        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;

        if (password !== confirm) {
            showMessage('register-msg', 'Passwords do not match', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();

            if (data.success) {
                showMessage('register-msg', 'Account created! Setting up your preferences...', 'success');
                setTimeout(() => window.location.href = '/settings?onboarding=1', 800);
            } else {
                showMessage('register-msg', data.error || 'Registration failed', 'error');
            }
        } catch (err) {
            showMessage('register-msg', 'Could not connect to server', 'error');
        } finally {
            if(!document.getElementById('register-msg').classList.contains('success')) {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    }
</script>
</body>
</html>
