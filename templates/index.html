<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Chatbot 🍜</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 450px;
            height: 650px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color: #ff6b6b;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header-left {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .chat-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }
        .user-badge {
            background-color: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        .header-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: inherit;
            transition: background 0.2s;
        }
        .header-btn:hover {
            background: rgba(255,255,255,0.35);
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #fffdf7;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            white-space: pre-wrap; 
        }
        .user-message {
            background-color: #4ecdc4;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .bot-message {
            background-color: #eeeeee;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .history-divider {
            text-align: center;
            color: #bbb;
            font-size: 0.75rem;
            margin: 10px 0;
            position: relative;
        }
        .history-divider::before,
        .history-divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background-color: #ddd;
        }
        .history-divider::before { left: 5%; }
        .history-divider::after { right: 5%; }
        .input-area {
            display: flex;
            padding: 20px;
            background-color: #fff;
            border-top: 1px solid #eee;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            margin-right: 10px;
            font-family: inherit;
        }
        button.send-btn {
            padding: 10px 20px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button.send-btn:hover { background-color: #ff5252; }
        /* --- NEW ANIMATED TYPING INDICATOR --- */
        .typing-indicator {
            display: none;
            background-color: #eeeeee; /* Matches your bot-message bubble */
            padding: 12px 16px;
            border-radius: 20px;
            border-bottom-left-radius: 0;
            margin-bottom: 15px;
            align-self: flex-start;
            width: fit-content;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #888;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        /* -------------------------------------- */
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="chat-header-left">🍜 Food Chatbot</div>
        <div class="chat-header-right">
            <span class="user-badge" id="user-badge">Loading...</span>
            <button class="header-btn" onclick="window.location.href='/settings'" title="Food Preferences">⚙️</button>
            <button class="header-btn" onclick="clearHistory()" title="Clear chat history">🗑️</button>
            <button class="header-btn" onclick="window.location.href='/auth/logout'" title="Logout">Logout</button>
        </div>
    </div>
    <div class="chat-messages" id="chat-box">
        <div class="typing-indicator" id="typing">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleEnter(event)" autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // Load user info and chat history on page load
    window.addEventListener("DOMContentLoaded", async () => {
        // Get current user
        try {
            const res = await fetch("/auth/me");
            const data = await res.json();
            if (data.logged_in) {
                document.getElementById("user-badge").textContent = data.username;
            } else {
                document.getElementById("user-badge").textContent = "Guest";
            }
        } catch (e) {
            document.getElementById("user-badge").textContent = "Guest";
        }

        // Load previous chat history
        try {
            const res = await fetch("/chat/history");
            const data = await res.json();
            if (data.history && data.history.length > 0) {
                // Add divider
                const chatBox = document.getElementById("chat-box");
                const divider = document.createElement("div");
                divider.className = "history-divider";
                divider.textContent = "Previous conversation";
                const typingIndicator = document.getElementById("typing");
                chatBox.insertBefore(divider, typingIndicator);

                data.history.forEach(msg => {
                    const cls = msg.role === "user" ? "user-message" : "bot-message";
                    appendMessage(msg.content, cls);
                });
            } else {
                // Show welcome message for new/guest users
                appendMessage(
                    "Eh hello! I am your Food Chatbot. Hungry already is it? Looking for makan recommendation or want to tell me your preferences?",
                    "bot-message"
                );
            }
        } catch (e) {
            appendMessage(
                "Eh hello! I am your Food Chatbot. Hungry already is it? Looking for makan recommendation or want to tell me your preferences?",
                "bot-message"
            );
        }
    });

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        const chatBox = document.getElementById("chat-box");
        const typingIndicator = document.getElementById("typing");

        if (message === "") return;

        appendMessage(message, "user-message");
        inputField.value = ""; 

        chatBox.appendChild(typingIndicator);
        typingIndicator.style.display = "block";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            typingIndicator.style.display = "none";
            appendMessage(data.reply, "bot-message");

        } catch (error) {
            typingIndicator.style.display = "none";
            appendMessage("Error: Could not connect to chatbot server.", "bot-message");
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", className);
        msgDiv.innerText = text; 
        
        const typingIndicator = document.getElementById("typing");
        chatBox.insertBefore(msgDiv, typingIndicator);
        chatBox.scrollTop = chatBox.scrollHeight; 
    }

    function handleEnter(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }

    async function clearHistory() {
        if (!confirm("Clear all chat history?")) return;
        try {
            await fetch("/chat/clear", { method: "POST" });
            // Remove all messages from chat box
            const chatBox = document.getElementById("chat-box");
            const typingIndicator = document.getElementById("typing");
            chatBox.innerHTML = "";
            chatBox.appendChild(typingIndicator);
            appendMessage(
                "Chat history cleared! Let's start fresh. What are you craving?",
                "bot-message"
            );
        } catch (e) {
            console.error("Failed to clear history", e);
        }
    }
</script>
</body>
</html>
